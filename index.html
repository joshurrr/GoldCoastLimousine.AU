<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Coast Limousine Hire</title>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: radial-gradient(circle at top, #0d0f1a, #05060d);
    color: white;
}

/* HERO */
.hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;

    background:
        linear-gradient(rgba(5,6,13,0.85), rgba(5,6,13,0.95)),
        url('limo.png');

    background-size: cover;
    background-position: center;
}

h1 {
    font-size: 56px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #ff2bd6, #00e0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    max-width: 500px;
    color: #aaa;
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 14px 32px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    color: white;

    background: linear-gradient(90deg, #ff2bd6, #00e0ff);
    box-shadow: 0 0 15px rgba(255,43,214,0.5),
                0 0 25px rgba(0,224,255,0.4);
    transition: 0.25s;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 25px rgba(255,43,214,0.8),
                0 0 40px rgba(0,224,255,0.6);
}

/* SECTION */
.section {
    padding: 80px 20px;
}

/* ALT */
.section.alt {
    background: linear-gradient(#0a0c18, #05060d);
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    text-align: center;
}

/* SERVICES GRID */
.services {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    margin-top: 40px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    padding: 25px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);

    backdrop-filter: blur(10px);

    transition: 0.25s;
    position: relative;
}

/* glow border */
.card::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: 14px;
    background: linear-gradient(90deg, #ff2bd6, #00e0ff);
    opacity: 0;
    z-index: -1;
    transition: 0.25s;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: translateY(-5px);
}

/* FORM */
form {
    max-width: 500px;
    margin: 40px auto 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

input, textarea {
    padding: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: white;
}

/* focus glow */
input:focus, textarea:focus {
    outline: none;
    border-color: #ff2bd6;
    box-shadow: 0 0 10px rgba(255,43,214,0.4);
}

/* FOOTER */
footer {
    padding: 40px;
    text-align: center;
    color: #888;
    border-top: 1px solid rgba(255,255,255,0.08);
}

a {
    color: #00e0ff;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Gold Coast Limousine</h1>
    <p>Luxury rides for weddings, parties & VIP nights</p>
    <a href="#booking" class="btn">Get a Quote</a>
</div>

<!-- SERVICES -->
<div class="section">
    <div class="container">
        <h2>Our Services</h2>

        <div class="services">
            <div class="card">Weddings</div>
            <div class="card">Formals & Parties</div>
            <div class="card">Airport Transfers</div>
            <div class="card">Corporate Events</div>
            <div class="card">Nights Out</div>
            <div class="card">VIP Transfers</div>
        </div>
    </div>
</div>

<!-- BOOKING -->
<div class="section alt" id="booking">
    <div class="container">
        <h2>Request a Booking</h2>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="tel" placeholder="Phone Number" required>
            <input type="text" placeholder="Pickup Location" required>
            <input type="text" placeholder="Destination" required>
            <input type="datetime-local" required>
            <textarea placeholder="Extra details"></textarea>
            <button class="btn">Submit Request</button>
        </form>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>Follow us:</p>
    <p>
        <a href="https://www.tiktok.com/@josh.u.rrr" target="_blank">TikTok</a> |
        <a href="https://radiorrr.com/" target="_blank">RadioRRR</a>
    </p>
</footer>

</body>
</html>
