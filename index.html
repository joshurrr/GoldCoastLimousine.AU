<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Coast Limousine Hire</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* HERO */
.hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;

    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
        url('limo.png');

    background-size: cover;
    background-position: center;
}

h1 {
    font-size: 52px;
    margin-bottom: 10px;
}

.hero p {
    max-width: 500px;
    color: #ccc;
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 14px 28px;
    background: #00e0ff;
    color: black;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
}

/* SECTION */
.section {
    padding: 80px 20px;
}

/* ALT BACKGROUND */
.section.alt {
    background: #111;
}

/* CONTAINER */
.container {
    max-width: 1000px;
    margin: auto;
    text-align: center;
}

/* SERVICES GRID */
.services {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 40px;
}

/* CARD */
.card {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 10px;
    transition: 0.2s;
}

.card:hover {
    background: #222;
}

/* FORM */
form {
    max-width: 500px;
    margin: 40px auto 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

input, textarea {
    padding: 12px;
    border-radius: 5px;
    border: none;
}

footer {
    padding: 40px;
    text-align: center;
    color: #888;
    border-top: 1px solid #222;
}

a {
    color: #00e0ff;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Gold Coast Limousine Hire</h1>
    <p>Luxury rides for weddings, parties & airport transfers</p>
    <a href="#booking" class="btn">Get a Quote</a>
</div>

<!-- SERVICES -->
<div class="section">
    <div class="container">
        <h2>Our Services</h2>

        <div class="services">
            <div class="card">Weddings</div>
            <div class="card">Formals & Parties</div>
            <div class="card">Airport Transfers</div>
            <div class="card">Corporate Events</div>
            <div class="card">Nights Out</div>
            <div class="card">VIP Transfers</div>
        </div>
    </div>
</div>

<!-- BOOKING -->
<div class="section alt" id="booking">
    <div class="container">
        <h2>Request a Booking</h2>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="tel" placeholder="Phone Number" required>
            <input type="text" placeholder="Pickup Location" required>
            <input type="text" placeholder="Destination" required>
            <input type="datetime-local" required>
            <textarea placeholder="Extra details"></textarea>
            <button class="btn">Submit Request</button>
        </form>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>Follow us:</p>
    <p>
        <a href="https://www.tiktok.com/@josh.u.rrr" target="_blank">TikTok</a> |
        <a href="https://radiorrr.com/" target="_blank">RadioRRR</a>
    </p>
</footer>

</body>
</html>
